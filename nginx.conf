server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # в”Ђв”Ђ Redirects de URLs legacy в†’ nuevo sistema в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

    # Login (todos los roles)
    rewrite ^/login/.*$              /login           permanent;
    rewrite ^/login1/.*$             /login           permanent;
    rewrite ^/login2/.*$             /login           permanent;

    # Admin
    rewrite ^/administrador/?.*$     /admin           permanent;

    # CatГЎlogo / Productos
    rewrite ^/catalogo/?.*$          /products        permanent;
    rewrite ^/product\.php.*$        /products        permanent;
    rewrite ^/product\.html$         /products        permanent;
    rewrite ^/product-detail\.html$  /products        permanent;

    # Carrito / Pedidos
    rewrite ^/shoping-cart\.php.*$   /orders          permanent;

    # Contacto
    rewrite ^/contactos/?.*$         /contact         permanent;
    rewrite ^/contact\.html$         /contact         permanent;

    # Guardar pedido
    rewrite ^/guardar_pedido/?.*$    /orders          permanent;

    # PГЎginas estГЎticas legacy
    rewrite ^/about\.html$           /               permanent;
    rewrite ^/blog\.html$            /               permanent;
    rewrite ^/blog-detail\.html$     /               permanent;
    rewrite ^/index\.html$           /               permanent;
    rewrite ^/paginaprincipal/?.*$   /               permanent;

    # Cualquier .php que quede sin mapear в†’ raГ­z
    rewrite ^/.*\.php.*$             /               permanent;

    # в”Ђв”Ђ Proxy al API в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_header  Set-Cookie;
    }

    # в”Ђв”Ђ Archivos estГЎticos con cachГ© agresiva в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # в”Ђв”Ђ SPA вЂ” todo lo demГЎs va a index.html в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    location / {
        try_files $uri $uri/ /index.html;
    }
}
